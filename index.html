<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>我的第一个网页</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1 id="title">你好，Codex</h1>
  <button onclick="changeTitle()">修改标题</button>
  <p>这是我学习 HTML 的第一个网页。</p>

  <h2>我的学习内容</h2>
 <ul id="studyList">
    <li>学习 Codex</li>
    <li>学习 Git</li>
    <li>学习 GitHub</li>
    <li>学习 VS Code</li>
    <li>学习 HTML</li>
  </ul>
  <input id="studyInput" type="text" placeholder="请输入新的学习内容">
<button onclick="addStudyItem()">添加学习内容</button>

  <h2>我的项目</h2>
  <p>
    这是我的 GitHub 仓库：
    <a href="https://github.com/h924780781-source/codex-learning">codex-learning</a>
  </p>

  <h2>JavaScript 练习</h2>
  <h2>输入框练习</h2>

<input id="nameInput" type="text" placeholder="请输入你的名字">
<button onclick="sayHello()">打招呼</button>

<p id="helloResult">这里会显示打招呼结果。</p>
<p id="helloCount">你已经打招呼 0 次</p>
<button onclick="resetCount()">重置次数</button>
  <p id="message">点击按钮前的文字。</p>
  <button onclick="changeMessage()">点击我</button>

  <h2>显示隐藏练习</h2>
  <p id="secretText">这是一段可以隐藏的文字。</p>
<button id="secretButton" onclick="toggleSecret()">隐藏文字</button>

  <script src="script.js"></script>

  <h2>CSS 样式切换练习</h2>

<p id="colorText">这段文字可以切换颜色。</p>
<button onclick="toggleColor()">切换颜色</button>

</body>
</html>
